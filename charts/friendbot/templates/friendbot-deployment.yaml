---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "common.fullname" . }}
  {{- if .Release.Namespace }}
  namespace: {{ .Release.Namespace }}
  {{- else }}
  namespace: default
  {{- end }}
  labels:
    app: {{ template "common.fullname" . }}
    chart: {{ template "common.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
  {{- if (.Values.friendbot.deployment).deploymentAnnotations }}
  annotations:
    {{- range $key, $value := .Values.friendbot.deployment.deploymentAnnotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  replicas: {{ .Values.friendbot.deployment.container.replicaCount }}
  selector:
    matchLabels:
      app: {{ template "common.fullname" . }}
  strategy:
    {{- if .Values.friendbot.deployment.strategy }}
    {{- toYaml .Values.friendbot.deployment.strategy | nindent 4 }}
    {{- else }}
    type: RollingUpdate
    {{- end }}
  template:
    metadata:
      labels:
        app: {{ template "common.fullname" . }}
        release: {{ .Release.Name }}
      {{- if (.Values.friendbot.deployment).labels }}
        {{- range $key, $value := .Values.friendbot.deployment.labels }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}
      {{- if (.Values.friendbot.deployment).annotations }}
      annotations:
        {{- range $key, $value := .Values.friendbot.deployment.annotations }}
          {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}
    spec:
      {{- if (.Values.friendbot).serviceAccountName }}
      serviceAccountName: {{ .Values.friendbot.serviceAccountName | default "default" }}
      {{- end }}
      containers:
      - name: friendbot
        image: {{ include "common.friendbotImage" . | quote }}
        {{- if (.Values.friendbot.deployment.container).cliArgs }}
        args:
          {{- range $flag := .Values.friendbot.deployment.container.cliArgs }}
          - {{ $flag | quote }}
          {{- end }}
        {{- end }}
        imagePullPolicy: {{ .Values.global.image.friendbot.pullPolicy }}
        ports:
        - containerPort: {{ .Values.friendbot.configmap.port | default 8000 }}
          protocol: TCP
        {{- with .Values.friendbot.deployment.container.startupProbe }}
        {{- $startupProbe := deepCopy . }}
        {{- if and (hasKey $startupProbe "tcpSocket") (kindIs "map" $startupProbe.tcpSocket) (not (hasKey $startupProbe.tcpSocket "port")) }}
        {{- $_ := set $startupProbe.tcpSocket "port" ($.Values.friendbot.configmap.port | default 8000) }}
        {{- end }}
        startupProbe:
          {{- toYaml $startupProbe | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: friendbot-secret
          mountPath: /secret
          readOnly: true
        - name: friendbot-conf
          mountPath: /config
          readOnly: true
      volumes:
        - name: friendbot-secret
          secret:
            secretName: {{ include "friendbot.secretName" . }}
        - name: friendbot-conf
          configMap:
            name: {{ template "common.fullname" . }}-config
