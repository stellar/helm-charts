{{- if and .Values.sdp.httpRoute.enabled .Values.sdp.httpRoute.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.sdp.httpRoute.gateway.name | default (printf "%s-gateway" (include "sdp.fullname" .)) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sdp.labels" . | nindent 4 }}
    {{- with .Values.sdp.httpRoute.gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.sdp.httpRoute.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ required "sdp.httpRoute.gateway.gatewayClassName is required when sdp.httpRoute.gateway.enabled is true" .Values.sdp.httpRoute.gateway.gatewayClassName }}
  listeners:
    {{- range .Values.sdp.httpRoute.gateway.listeners }}
    - name: {{ .name }}
      protocol: {{ .protocol }}
      port: {{ .port }}
      {{- if .hostname }}
      hostname: {{ tpl .hostname $ | quote }}
      {{- end }}
      {{- if .allowedRoutes }}
      allowedRoutes:
        {{- toYaml .allowedRoutes | nindent 8 }}
      {{- end }}
      {{- if .tls }}
      tls:
        {{- toYaml .tls | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
{{- if and .Values.dashboard.enabled .Values.dashboard.httpRoute.enabled .Values.dashboard.httpRoute.gateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.dashboard.httpRoute.gateway.name | default (printf "%s-dashboard-gateway" (include "sdp.fullname" .)) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sdp.labelsWithSuffix" (list . "-dashboard") | nindent 4 }}
    {{- with .Values.dashboard.httpRoute.gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.dashboard.httpRoute.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ required "dashboard.httpRoute.gateway.gatewayClassName is required when dashboard.httpRoute.gateway.enabled is true" .Values.dashboard.httpRoute.gateway.gatewayClassName }}
  listeners:
    {{- range .Values.dashboard.httpRoute.gateway.listeners }}
    - name: {{ .name }}
      protocol: {{ .protocol }}
      port: {{ .port }}
      {{- if .hostname }}
      hostname: {{ tpl .hostname $ | quote }}
      {{- end }}
      {{- if .allowedRoutes }}
      allowedRoutes:
        {{- toYaml .allowedRoutes | nindent 8 }}
      {{- end }}
      {{- if .tls }}
      tls:
        {{- toYaml .tls | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
