{{- if and .Values.dashboard.enabled .Values.dashboard.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "sdp.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sdp.labelsWithSuffix" (list . "-dashboard") | nindent 4 }}
    {{- with .Values.dashboard.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.dashboard.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.dashboard.httpRoute.gateway.enabled }}
    - name: {{ .Values.dashboard.httpRoute.gateway.name | default (printf "%s-dashboard-gateway" (include "sdp.fullname" .)) }}
    {{- else }}
    {{- range .Values.dashboard.httpRoute.parentRefs }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName }}
      {{- end }}
    {{- end }}
    {{- end }}
  hostnames:
    {{- if .Values.dashboard.httpRoute.hostnames }}
    {{- range .Values.dashboard.httpRoute.hostnames }}
    - {{ tpl . $ | quote }}
    {{- end }}
    {{- else }}
    - {{ include "sdp.dashboard.domain" . | quote }}
    {{- if .Values.dashboard.route.mtnDomain }}
    - {{ include "sdp.dashboard.mtnDomain" . | quote }}
    {{- end }}
    {{- end }}
  rules:
    - backendRefs:
        - name: {{ include "sdp.fullname" . }}-dashboard
          port: {{ include "sdp.dashboard.port" . }}
{{- end }}
